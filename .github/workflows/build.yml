name: Cross-Platform Build

on:
  push:
    branches:
      - main  # Trigger on push to the main branch
  pull_request:
    branches:
      - main  # Trigger on PRs to the main branch

jobs:

  # Windows Build (MSVC)
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v1.0

      - name: Install dependencies (MSYS2)
        run: |
          choco install msys2
          pacman -S mingw-w64-x86_64-gcc
          pacman -S mingw-w64-x86_64-libomp

      - name: Build for Windows
        run: |
          g++ -O3 -lm -fopenmp AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp -c
          g++ main.cpp fluctuoscope.o  AGM_sfunctions.o fileutils.o stringutils.o paramfile.o -O3 -lm -fopenmp -o FSCOPE_windows.exe
          g++ -O3 -lm -fopenmp -shared -o fluctuoscopy_extC.dll -fPIC AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp

      - name: Upload Windows Build
        uses: actions/upload-artifact@v2
        with:
          name: windows-build
          path: |
            fluctuoscopy_extC.dll
            FSCOPE_windows.exe

  # Linux Build (Ubuntu)
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up GCC and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ clang libomp-dev

      - name: Build for Linux
        run: |
          g++ -O3 -lm -fopenmp AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp -c
          g++ main.cpp fluctuoscope.o  AGM_sfunctions.o fileutils.o stringutils.o paramfile.o -O3 -lm -fopenmp -o FSCOPE_linux
          g++ -O3 -lm -fopenmp -shared -o fluctuoscopy_extC.so -fPIC AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp

      - name: Upload Linux Build
        uses: actions/upload-artifact@v2
        with:
          name: linux-build
          path: |
            fluctuoscopy_extC.so
            FSCOPE_linux

  # macOS (Universal Binary) Build
  macos-universal:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
  
      - name: Set up Homebrew and dependencies
        run: |
          brew install libomp
          
      - name: Build for macOS x86_64
        run: |
          clang++ -O3 -lm -fopenmp AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp -c
          clang++ main.cpp fluctuoscope.o  AGM_sfunctions.o fileutils.o stringutils.o paramfile.o -O3 -lm -fopenmp -o FSCOPE_mac_x86_64
          clang++ -O3 -lm -fopenmp -shared -o fluctuoscopy_extC_x86_64.dylib -fPIC AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp
  
      - name: Build for macOS arm64
        run: |
          clang++ -O3 -lm -fopenmp AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp -c
          clang++ main.cpp fluctuoscope.o  AGM_sfunctions.o fileutils.o stringutils.o paramfile.o -O3 -lm -fopenmp -o FSCOPE_mac_arm64
          clang++ -O3 -lm -fopenmp -shared -o fluctuoscopy_extC_arm64.dylib -fPIC AGM_sfunctions.cpp fileutils.cpp stringutils.cpp paramfile.cpp fluctuoscope.cpp
  
      - name: Combine into Universal Binary
        run: |
          lipo -create fluctuoscopy_extC_x86_64.dylib fluctuoscopy_extC_arm64.dylib -output fluctuoscopy_extC.dylib
          lipo -create FSCOPE_mac_x86_64 FSCOPE_mac_arm64 -output FSCOPE_mac
  
      - name: Upload macOS Universal Binary
        uses: actions/upload-artifact@v2
        with:
          name: macos-universal-build
          path: |
            fluctuoscopy_extC.dylib
            FSCOPE_mac
